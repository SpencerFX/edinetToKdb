[paths]
project_root = ".."
working_dir = "../data/output"
translations_csv = "../data/corporate_entity_translations.csv"
output_dir = "../data/output"
raw_dir = "../data/raw"

[api]
env_var_name = "EDINET_API_KEY"
doc_list_url = "https://api.edinet-fsa.go.jp/api/v2/documents.json"
doc_get_url = "https://api.edinet-fsa.go.jp/api/v2/documents/{doc_id}"

[edinet]
doc_type_annual = "120"
sleep_seconds = 0.1

[run]
default_start_year = 2026
default_start_month = 1
default_end_year = 2026
default_end_month = 5

[files]
annual_output_prefix = "annual_statement"