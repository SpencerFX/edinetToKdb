[paths]
project_root = ".."
working_dir = "../data/output"
translations_csv = "../data/corporate_entity_translations.csv"
output_dir = "../data/output"
raw_dir = "../data/raw"

[api]
env_var_name = "EDINET_API_KEY"

[edinet]
sleep_seconds = 0.1

[run]
default_start_year = 2026
default_start_month = 1
default_end_year = 2026
default_end_month = 5

[report_types.annual]
doc_type_codes = ["120"]
output_prefix = "annual_financials"

[report_types.semi_annual]
doc_type_codes = ["160", "170"]
output_prefix = "semi_annual_financials"